name: Deploy H5 to FC

on:
  push:
    branches: [main]

  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build H5
        run: npm run build:h5

      - name: Prepare deploy package
        run: |
          # 创建部署目录
          mkdir -p deploy

          # 复制 H5 构建产物
          cp -r dist/h5/* deploy/

          # 复制 FC 入口文件
          cp fc-entry/index.js deploy/
          cp fc-entry/package.json deploy/

          # 查看部署目录结构
          echo "=== Deploy package ==="
          find deploy -type f | head -20
          echo "..."
          echo "Total files: $(find deploy -type f | wc -l)"

      - name: Package with adm-zip
        run: |
          npm install adm-zip --legacy-peer-deps --no-save
          node -e "
            const AdmZip = require('adm-zip');
            const zip = new AdmZip();
            zip.addLocalFolder('deploy', '');
            zip.writeZip('code.zip');
            console.log('code.zip created successfully');
            console.log('Size:', require('fs').statSync('code.zip').size, 'bytes');
          "

      - name: Install Serverless Devs
        run: |
          npm install -g @serverless-devs/s
          s --version

      - name: Configure credentials
        run: |
          s config add \
            --AccountID "${{ secrets.ALIYUN_ACCOUNT_ID }}" \
            --AccessKeyID "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            --AccessKeySecret "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" \
            -a default

      - name: Deploy with Serverless Devs
        run: |
          s deploy -y
          echo "✅ Deploy completed!"

      - name: Clean up
        if: always()
        run: rm -rf deploy code.zip
