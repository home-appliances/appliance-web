name: Deploy H5 to FC

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build H5
        run: npm run build:h5

      - name: Clean old files
        run: |
          rm -rf deploy code.zip
          echo "Cleaned old deploy files"

      - name: Prepare deploy package
        run: |
          # 创建部署目录
          mkdir -p deploy/public

          # 复制 H5 构建产物到 public 目录
          cp -r dist/h5/* deploy/public/

          # 复制 FC 入口文件到根目录
          cp fc-entry/index.js deploy/
          cp fc-entry/package.json deploy/

          # 查看部署目录结构
          echo "=== Deploy package ==="
          find deploy -type f | head -20

      - name: Package with system zip
        run: |
          cd deploy && zip -r ../code.zip . && cd ..
          ls -la code.zip

      - name: Deploy to FC 2.0 with fc2 SDK
        env:
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          npm install @alicloud/fc2 --no-save

          node -e "
          const FC = require('@alicloud/fc2');
          const fs = require('fs');

          const client = new FC(process.env.ALIYUN_ACCOUNT_ID, {
            accessKeyID: process.env.ALIYUN_ACCESS_KEY_ID,
            accessKeySecret: process.env.ALIYUN_ACCESS_KEY_SECRET,
            region: 'cn-shenzhen',
          });

          const SERVICE_NAME = 'appliance-service';
          const FUNCTION_NAME = 'web';
          const codeZip = fs.readFileSync('code.zip');

          async function deploy() {
            try {
              // 尝试更新函数代码
              await client.updateFunctionCode(SERVICE_NAME, FUNCTION_NAME, {
                zipFile: codeZip.toString('base64'),
              });
              console.log('✅ Function code updated');
            } catch (e) {
              if (e.code === 'FunctionNotFound') {
                // 函数不存在，先确保服务存在，再创建函数
                console.log('Creating service and function...');
                try {
                  await client.createService(SERVICE_NAME, {
                    description: '京东家电搜索服务',
                  });
                  console.log('Service created');
                } catch (se) {
                  if (se.code !== 'ServiceAlreadyExists') throw se;
                  console.log('Service already exists');
                }

                await client.createFunction(SERVICE_NAME, {
                  functionName: FUNCTION_NAME,
                  description: '京东家电搜索 H5 前端',
                  runtime: 'nodejs20',
                  handler: 'index.handler',
                  timeout: 30,
                  memorySize: 512,
                  code: {
                    zipFile: codeZip.toString('base64'),
                  },
                  environmentVariables: {
                    API_BACKEND: 'http://fc.cheapgo.top',
                  },
                });
                console.log('✅ Function created');
              } else {
                throw e;
              }
            }
          }

          deploy().catch(err => {
            console.error('❌ Deploy failed:', err.message || err);
            process.exit(1);
          });
          "
