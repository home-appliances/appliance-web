name: Deploy to FC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build H5
        run: npm run build:h5

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy/public
          cp -r dist/h5/* deploy/public/
          cp fc-entry/index.js deploy/
          cp fc-entry/package.json deploy/

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure credentials
        run: s config add --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -a default -f

      - name: Deploy to FC
        env:
          API_BACKEND: ${{ secrets.API_BACKEND }}
        run: s deploy -y --use-local
