name: Renew SSL Certificate

on:
  schedule:
    - cron: '0 3 1,31 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Install acme.sh
        run: curl https://get.acme.sh | sh -s email=admin@cheapgo.top

      - name: Install aliyun CLI
        run: |
          curl -fsSL "https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz" -o aliyun-cli.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Configure credentials
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          aliyun configure set --mode AK \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET" \
            --region "cn-shenzhen"
          echo "Ali_Key=$ALIYUN_ACCESS_KEY_ID" >> ~/.acme.sh/account.conf
          echo "Ali_Secret=$ALIYUN_ACCESS_KEY_SECRET" >> ~/.acme.sh/account.conf

      - name: Issue/Renew Certificate (RSA 2048)
        run: |
          ~/.acme.sh/acme.sh --issue \
            -d appliance-web.cheapgo.top \
            --dns dns_ali \
            --keylength 2048 \
            --server letsencrypt \
            --force

      - name: Upload certificate to FC
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          npm install @alicloud/openapi-util --no-save
          node -e "
          const fs = require('fs');
          const https = require('https');
          const crypto = require('crypto');

          const cert = fs.readFileSync(process.env.HOME + '/.acme.sh/appliance-web.cheapgo.top/fullchain.cer', 'utf-8');
          const key = fs.readFileSync(process.env.HOME + '/.acme.sh/appliance-web.cheapgo.top/appliance-web.cheapgo.top.key', 'utf-8');

          const body = JSON.stringify({
            protocol: 'HTTP,HTTPS',
            routeConfig: { routes: [{ path: '/*', functionName: 'web', qualifier: 'LATEST' }] },
            certConfig: { certType: 'upload', certName: 'appliance-web-cheapgo', certificate: cert, privateKey: key }
          });

          const accessKeyId = process.env.ALIYUN_ACCESS_KEY_ID;
          const accessKeySecret = process.env.ALIYUN_ACCESS_KEY_SECRET;
          const date = new Date().toUTCString();
          const bodyMd5 = crypto.createHash('md5').update(body).digest('base64');
          const stringToSign = 'PUT\napplication/json\n' + bodyMd5 + '\n' + date + '\n/2023-03-30/custom-domains/appliance-web.cheapgo.top';
          const signature = crypto.createHmac('sha1', accessKeySecret).update(stringToSign).digest('base64');
          const auth = 'acs ' + accessKeyId + ':' + signature;

          const options = {
            hostname: '1132479615817727.cn-shenzhen.fc.aliyuncs.com',
            path: '/2023-03-30/custom-domains/appliance-web.cheapgo.top',
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Content-MD5': bodyMd5,
              'Date': date,
              'Authorization': auth,
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              console.log('Status:', res.statusCode);
              const result = JSON.parse(data);
              console.log('certName:', result.certConfig?.certName);
              console.log('protocol:', result.protocol);
            });
          });
          req.write(body);
          req.end();
          "

      - name: Verify HTTPS
        run: sleep 10 && curl -sI https://appliance-web.cheapgo.top | head -5
