name: Renew SSL Certificate

on:
  schedule:
    - cron: '0 3 1,31 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Install acme.sh
        run: curl https://get.acme.sh | sh -s email=admin@cheapgo.top

      - name: Install aliyun CLI
        run: |
          curl -fsSL "https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz" -o aliyun-cli.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Configure credentials
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          aliyun configure set --mode AK \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET" \
            --region "cn-shenzhen"
          echo "Ali_Key=$ALIYUN_ACCESS_KEY_ID" >> ~/.acme.sh/account.conf
          echo "Ali_Secret=$ALIYUN_ACCESS_KEY_SECRET" >> ~/.acme.sh/account.conf

      - name: Issue/Renew Certificate (RSA 2048)
        run: |
          ~/.acme.sh/acme.sh --issue \
            -d appliance-web.cheapgo.top \
            --dns dns_ali \
            --keylength 2048 \
            --server letsencrypt \
            --force

      - name: Upload certificate to FC
        run: |
          # 调试：检查文件是否存在
          echo "=== Cert file ==="
          ls -la ~/.acme.sh/appliance-web.cheapgo.top/fullchain.cer
          echo "=== Key file ==="
          ls -la ~/.acme.sh/appliance-web.cheapgo.top/appliance-web.cheapgo.top.key
          echo "=== Key head ==="
          head -1 ~/.acme.sh/appliance-web.cheapgo.top/appliance-web.cheapgo.top.key

          # 用 Node.js 构建 JSON（避免 jq 处理 PEM 的问题）
          node -e "
          const fs = require('fs');
          const cert = fs.readFileSync(process.env.HOME + '/.acme.sh/appliance-web.cheapgo.top/fullchain.cer', 'utf-8');
          const key = fs.readFileSync(process.env.HOME + '/.acme.sh/appliance-web.cheapgo.top/appliance-web.cheapgo.top.key', 'utf-8');
          const body = {
            protocol: 'HTTP,HTTPS',
            routeConfig: { routes: [{ path: '/*', functionName: 'web', qualifier: 'LATEST' }] },
            certConfig: { certType: 'upload', certName: 'appliance-web-cheapgo', certificate: cert, privateKey: key }
          };
          fs.writeFileSync('/tmp/fc-body.json', JSON.stringify(body));
          console.log('JSON written, key length:', key.length);
          "

          aliyun fc PUT /2023-03-30/custom-domains/appliance-web.cheapgo.top --body "$(cat /tmp/fc-body.json)"

      - name: Verify HTTPS
        run: sleep 10 && curl -sI https://appliance-web.cheapgo.top | head -5
