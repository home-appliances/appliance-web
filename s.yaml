edition: 3.0.0
name: jd-appliance-web
access: default

vars:
  region: cn-shenzhen

resources:
  web:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: appliance-service
      functionName: web
      description: '京东家电搜索 H5 前端'
      runtime: nodejs20
      handler: index.handler
      timeout: 30
      memorySize: 512
      cpu: 0.5
      diskSize: 512
      code: ./code.zip
      environmentVariables:
        API_BACKEND: 'http://fc.cheapgo.top'
