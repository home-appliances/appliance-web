edition: 3.0.0
name: jd-appliance-web
access: default

vars:
  region: cn-shenzhen

resources:
  web:
    component: fc
    props:
      region: ${vars.region}
      service:
        name: appliance-service
        description: '京东家电搜索服务'
      function:
        name: web
        description: '京东家电搜索 H5 前端'
        runtime: nodejs20
        handler: index.handler
        timeout: 30
        memorySize: 512
        code: ./deploy
        environmentVariables:
          API_BACKEND: 'https://fc.cheapgo.top'
