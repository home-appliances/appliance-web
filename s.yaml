edition: 3.0.0
name: appliance-web
access: default

vars:
  region: cn-shenzhen

resources:
  web:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: appliance
      functionName: web
      description: '家电搜索 H5 前端 (Taro + React)'
      runtime: nodejs20
      handler: index.handler
      code: ./deploy
      memorySize: 512
      timeout: 30
      environmentVariables:
        API_BACKEND: ${env('API_BACKEND')}
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
