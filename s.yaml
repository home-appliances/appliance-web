edition: 3.0.0
name: jd-appliance-web
access: default

vars:
  region: cn-shenzhen

resources:
  web:
    component: fc3
    props:
      region: ${vars.region}
      functionName: web
      description: '京东家电搜索 H5 前端'
      runtime: nodejs18
      handler: index.handler
      timeout: 30
      memorySize: 256
      cpu: 0.5
      diskSize: 512
      code: ./code.zip
      environmentVariables:
        API_BACKEND: 'https://applican-applian-service-uzjmdtpnxs.cn-shenzhen-vpc.fcapp.run'
